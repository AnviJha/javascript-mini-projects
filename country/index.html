<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniExplorer</title>

    <link rel="stylesheet" href="style.css">

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>

<body>

    <div class="container">

        <div class="hero-top">

            <div class="badge">
                🌍 Explore Universities Worldwide
            </div>

            <div class="heading">

                <h1>UniExplorer</h1>

                <p>
                    Search universities across the globe and
                    discover institutions from different countries.
                </p>

            </div>

            <div class="stats">

                <div class="stat-card">
                    <h2>190+</h2>
                    <p>Countries</p>
                </div>

                <div class="stat-card">
                    <h2>10K+</h2>
                    <p>Universities</p>
                </div>

                <div class="stat-card">
                    <h2>Free</h2>
                    <p>API Access</p>
                </div>

            </div>

        </div>

        <div class="search-section">

            <div class="search-box">

                <input placeholder="Enter country name">

                <button>Search</button>

            </div>

            <p class="search-text">
                Try: India, Japan, Canada, Germany...
            </p>

        </div>

        <p class="message"></p>

        <ul id="list"></ul>

    </div>

    <script src="script.js"></script>

</body>
</html>
